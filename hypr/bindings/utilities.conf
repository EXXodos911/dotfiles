# Menus
bindd = SUPER, SPACE, Launch apps, exec, walker --width 644 --maxheight 300 --minheight 300
bindd = SUPER, R, Screen record menu, exec, ~/.config/hypr/scripts/screenrecord-menu.sh

# Captures (Something weird with PRINT input, also the VIA config is broken)
bindd = , PRINT, Screenshot, exec, hyprshot -z -m region -o ~/Pictures/Screenshots
bindd = ALT, PRINT, Screenrecording, exec, ~/.config/hypr/scripts/screenrecord-menu.sh
bindd = SUPER SHIFT, S, Screenshot, exec, hyprshot -z -m region -o ~/Pictures/Screenshots

# Control panels
bindd = SUPER CTRL, S, Sound controls, exec, uwsm app -- xdg-terminal-exec --app-id=TUI.float wiremix
bindd = SUPER CTRL, A, Activity, exec, uwsm app -- xdg-terminal-exec --app-id=TUI.float btop

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock system
bindd = SUPER CTRL, L, Lock system, exec, hyprctl switchxkblayout all 0 & (pidof hyprlock || hyprlock &)

# Clipboard
bindd = SUPER CTRL, V, Clipboard manager, exec, walker --width 644 --maxheight 300 --minheight 300 -m clipboard
