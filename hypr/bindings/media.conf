# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, swayosd-client --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, swayosd-client --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, swayosd-client --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, swayosd-client --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, hyprctl hyprsunset gamma +5
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, hyprctl hyprsunset gamma -5

# Precise 1% multimedia adjustments with Alt modifier
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, swayosd-client --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, swayosd-client --output-volume -1
bindeld = ALT, XF86MonBrightnessUp, Brightness up precise, exec, hyprctl hyprsunset gamma +1
bindeld = ALT, XF86MonBrightnessDown, Brightness down precise, exec, hyprctl hyprsunset gamma -1